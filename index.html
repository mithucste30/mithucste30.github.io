<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0c0e12" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#faf8f3" media="(prefers-color-scheme: light)" />
    <title>MD Mazharul Islam — Platform Engineer · Software Architect</title>
    <meta
      name="description"
      content="Portfolio of MD Mazharul Islam — Platform Engineer and Software Architect. 12+ years building multi-cloud compute platforms, multi-tenant systems, and AI-native infrastructure with Go and Ruby on Rails."
    />
    <!-- No-flash theme: apply persisted theme before first paint -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('mz-theme');
          if (t === 'light') document.documentElement.classList.add('light');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
